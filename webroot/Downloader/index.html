<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Coming Soon</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: radial-gradient(circle at top, #1c2045, #0e1020);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: #e9ecff;
            overflow: hidden;
        }

        .container {
            text-align: center;
            padding: 40px 24px;
            max-width: 400px;
            width: 100%;
        }

        .icon-container {
            width: 120px;
            height: 120px;
            margin: 0 auto 32px;
            background: #1b1e33cc;
            backdrop-filter: blur(14px);
            -webkit-backdrop-filter: blur(14px);
            border-radius: 28px;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 1px solid #ffffff14;
            box-shadow: 0 20px 60px #00000088;
            animation: float 3s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        .icon-container svg {
            width: 56px;
            height: 56px;
            fill: #4da3ff;
        }

        h1 {
            font-size: 32px;
            font-weight: 700;
            margin-bottom: 12px;
            letter-spacing: -0.5px;
            color: #e9ecff;
        }

        .subtitle {
            font-size: 16px;
            color: #9aa3ff;
            line-height: 1.5;
            margin-bottom: 40px;
        }

        .progress-container {
            width: 100%;
            height: 6px;
            background: #1b1e33cc;
            border-radius: 3px;
            overflow: hidden;
            margin-bottom: 16px;
            border: 1px solid #ffffff14;
        }

        .progress-bar {
            height: 100%;
            width: 65%;
            background: #4da3ff;
            border-radius: 3px;
            animation: pulse 2s ease-in-out infinite;
            box-shadow: 0 0 12px rgba(77, 163, 255, 0.4);
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.6; }
        }

        .progress-text {
            font-size: 13px;
            color: #9aa3ff;
            font-weight: 500;
        }

        .dots {
            display: inline-flex;
            gap: 6px;
            margin-top: 48px;
        }

        .dot {
            width: 8px;
            height: 8px;
            background: #4da3ff;
            border-radius: 50%;
            opacity: 0.3;
            animation: dotPulse 1.4s ease-in-out infinite;
        }

        .dot:nth-child(2) { animation-delay: 0.2s; }
        .dot:nth-child(3) { animation-delay: 0.4s; }

        @keyframes dotPulse {
            0%, 100% { opacity: 0.3; transform: scale(1); }
            50% { opacity: 1; transform: scale(1.2); }
        }

        .back-btn {
            margin-top: 40px;
            padding: 14px 32px;
            background: #1b1e33cc;
            backdrop-filter: blur(14px);
            -webkit-backdrop-filter: blur(14px);
            border: 1px solid #ffffff14;
            border-radius: 14px;
            color: #4da3ff;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: 0 20px 60px #00000088;
            font-family: inherit;
        }

        .back-btn:active {
            transform: scale(0.96);
            background: rgba(77, 163, 255, 0.15);
        }

        .version {
            position: fixed;
            bottom: 24px;
            font-size: 12px;
            color: #9aa3ff;
            opacity: 0.6;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="icon-container">
            <svg viewBox="0 0 24 24">
                <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 15l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z"/>
            </svg>
        </div>
        
        <h1>Coming Soon</h1>
        <p class="subtitle">This feature is currently under development. Stay tuned for the upcoming release.</p>
        
        <div class="progress-container">
            <div class="progress-bar"></div>
        </div>
        <p class="progress-text">Development in Progress</p>
        
        <div class="dots">
            <div class="dot"></div>
            <div class="dot"></div>
            <div class="dot"></div>
        </div>
        
    </div>
    
    <div class="version">v38 ßeta</div>
</body>
</html>
