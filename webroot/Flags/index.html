<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Control Centre</title>
<link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
<style>
:root{
  --bg:#1f2233;
  --fg:#e6e6e6;
  --accent:#4da3ff;
  --accent-glow:rgba(77,163,255,0.3);
  --panel-bg:#232637cc;
  --card-bg:#232637ee;
  --border-radius:20px;
  --shadow:rgba(0,0,0,0.4);
  --transition:0.3s;
  --success:#4dff88;
  --danger:#ff4d4d;
  --text2:#9aa3ff;
}
*{box-sizing:border-box}
body{
  margin:0;min-height:100vh;
  display:flex;align-items:center;justify-content:center;
  font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display",system-ui;
  background:radial-gradient(circle at 30% 20%,#1c2045 0%,#0e1020 100%);
  color:var(--fg);
  -webkit-font-smoothing:antialiased;
  padding:20px;
}
.card{
  width:380px;max-width:100%;
  background:var(--panel-bg);
  backdrop-filter:blur(20px);
  border-radius:var(--border-radius);
  padding:28px;
  box-shadow:0 25px 60px var(--shadow),0 0 0 1px rgba(255,255,255,0.06);
  position:relative;overflow:hidden;
  animation:cardEntry 0.6s cubic-bezier(0.2,0.8,0.2,1);
}
@keyframes cardEntry{
  from{opacity:0;transform:translateY(30px) scale(0.96)}
  to{opacity:1;transform:translateY(0) scale(1)}
}
.card::before{
  content:"";
  position:absolute;inset:0;
  background:radial-gradient(circle at 50% 0%,var(--accent) 0%,transparent 70%);
  filter:blur(40px);opacity:0.15;pointer-events:none;z-index:0;
  animation:glowPulse 8s ease-in-out infinite;
}
@keyframes glowPulse{0%,100%{opacity:0.12}50%{opacity:0.25}}
h1{
  position:relative;z-index:2;
  margin:0 0 8px 0;text-align:center;
  font-size:22px;font-weight:700;
  color:var(--fg);
  display:flex;align-items:center;justify-content:center;gap:10px;
}
.subtitle{
  text-align:center;color:var(--text2);
  font-size:13px;font-weight:500;margin-bottom:24px;
  position:relative;z-index:2;
}
.divider{
  position:relative;z-index:2;
  height:1px;
  background:linear-gradient(90deg,transparent,rgba(255,255,255,0.1),transparent);
  margin:16px 0;
}
.section-label{
  position:relative;z-index:2;
  font-size:11px;
  font-weight:600;
  text-transform:uppercase;
  letter-spacing:1.2px;
  color:var(--text2);
  margin-bottom:12px;
  padding-left:4px;
}
.row{
  position:relative;z-index:2;
  display:flex;align-items:center;justify-content:space-between;
  gap:14px;padding:16px;border-radius:16px;
  background:rgba(255,255,255,0.03);
  border:1px solid rgba(255,255,255,0.06);
  margin-bottom:10px;
  transition:all 0.25s cubic-bezier(0.4,0,0.2,1);
  cursor:pointer;
}
.row:hover{
  background:rgba(255,255,255,0.06);
  transform:translateY(-2px);
  box-shadow:0 8px 24px rgba(0,0,0,0.3);
  border-color:rgba(77,163,255,0.2);
}
.row:active{transform:scale(0.98)}
.row.active{
  background:rgba(77,163,255,0.1);
  border-color:rgba(77,163,255,0.4);
  box-shadow:0 0 20px rgba(77,163,255,0.15);
}
.row.active .icon-wrap{
  background:var(--accent);
  box-shadow:0 4px 16px var(--accent-glow);
}
.row.active .icon-wrap .material-icons{color:white}
.row.active .title{color:var(--accent)}
.row.active .status-dot{
  background:var(--success);
  box-shadow:0 0 12px var(--success);
}
.icon-wrap{
  width:44px;height:44px;border-radius:12px;
  background:rgba(255,255,255,0.08);
  display:flex;align-items:center;justify-content:center;
  transition:all 0.3s;flex-shrink:0;
}
.icon-wrap .material-icons{
  font-size:42px;color:var(--text2);
  transition:all 0.3s;
}
.content{flex:1;min-width:0}
.title{
  font-size:15px;font-weight:600;
  color:var(--fg);margin-bottom:3px;
  transition:color 0.3s;
}
.subtitle-text{
  font-size:12px;color:var(--text2);
  font-weight:500;line-height:1.3;
}
.status-dot{
  width:8px;height:8px;border-radius:50%;
  background:rgba(255,255,255,0.2);
  transition:all 0.3s;flex-shrink:0;
}
.switch{
  position:relative;width:54px;height:30px;flex-shrink:0;
  pointer-events:none;
}
.switch input{position:absolute;opacity:0;width:0;height:0}
.slider{
  position:absolute;inset:0;border-radius:999px;
  background:rgba(255,255,255,0.1);
  transition:all var(--transition);
  box-shadow:inset 0 2px 4px rgba(0,0,0,0.2);
}
.knob{
  position:absolute;left:3px;top:3px;
  width:24px;height:24px;border-radius:50%;
  background:linear-gradient(145deg,#fff,#e0e0e0);
  transition:transform 0.25s cubic-bezier(0.2,0.8,0.2,1);
  box-shadow:0 2px 8px rgba(0,0,0,0.3);
}
.switch input:checked + .slider{
  background:var(--accent);
  box-shadow:0 0 20px var(--accent-glow);
}
.switch input:checked + .slider .knob{transform:translateX(24px)}
.switch input:disabled + .slider{
  background:rgba(255,255,255,0.05);
  opacity:0.5;
}
.row.spinning{pointer-events:none;opacity:0.6}
.row.spinning .icon-wrap::after{
  content:"";
  position:absolute;
  top:50%;left:50%;
  width:18px;height:18px;
  margin:-9px 0 0 -9px;
  border:2px solid var(--accent);
  border-top-color:transparent;
  border-radius:50%;
  animation:spin 0.7s linear infinite;
}
@keyframes spin{to{transform:rotate(360deg)}}
.action-btn{
  margin-top:20px;padding:16px;
  background:rgba(77,163,255,0.1);
  border:1px solid rgba(77,163,255,0.3);
  border-radius:16px;
  display:flex;align-items:center;justify-content:center;
  gap:10px;cursor:pointer;
  transition:all 0.25s;
  position:relative;z-index:2;
}
.action-btn:hover{
  background:rgba(77,163,255,0.2);
  transform:translateY(-2px);
  box-shadow:0 8px 24px rgba(77,163,255,0.2);
}
.action-btn:active{transform:scale(0.98)}
.action-btn .material-icons{
  font-size:20px;color:var(--accent);
  animation:spin 4s linear infinite;
  animation-play-state:paused;
}
.action-btn:hover .material-icons{animation-play-state:running}
.footer{
  margin-top:20px;text-align:center;
  color:var(--text2);font-size:12px;opacity:0.7;
  position:relative;z-index:2;
}
.webui-popup{
  position:fixed;
  top:-70px;
  left:50%;
  transform:translateX(-50%);
  padding:0.8rem 1.2rem;
  border-radius:10px;
  color:#fff;
  font-weight:600;
  font-size:13px;
  z-index:99999;
  box-shadow:0 6px 18px rgba(0,0,0,0.35);
  transition:top 0.36s,opacity 0.36s;
  opacity:0;
  pointer-events:none;
  white-space:nowrap;
  backdrop-filter:blur(10px);
  -webkit-backdrop-filter:blur(10px);
  border:1px solid rgba(255,255,255,0.1);
}
@media(max-width:420px){
  .card{width:100%;padding:22px}
  .row{padding:14px}
  .icon-wrap{width:40px;height:40px}
}
</style>
</head>
<body>
<div class="card">
  <h1><span class="material-icons">settings</span>Control Centre</h1>
  <div class="subtitle">IntegrityBox Configuration</div>

  <div class="row" id="row-action_exec" onclick="toggleExec()">
    <div class="icon-wrap"><span class="material-icons">play_circle</span></div>
    <div class="content">
      <div class="title">Auto Run</div>
      <div class="subtitle-text">Run automation via toggle</div>
    </div>
    <div class="status-dot"></div>
    <label class="switch" onclick="event.stopPropagation()">
      <input type="checkbox" id="cb-action_exec">
      <span class="slider"><span class="knob"></span></span>
    </label>
  </div>

  <div class="divider"></div>
  <div class="section-label">Configuration</div>

  <div id="rows"></div>

  <div class="action-btn" onclick="refreshAll()">
    <span class="material-icons">refresh</span>
    <span>Refresh States</span>
  </div>

  <div class="footer">IntegrityBox &bull; 2026</div>
</div>

<script>
const DIR="/data/adb/Box-Brain";
const ACTION_SCRIPT="/data/adb/modules/playintegrityfix/action.sh";

const REBOOT_ITEMS=["nodebug","build","tag","twrp","rukja","safemode","skip","encrypt","NoLineageProp"];
const ACTION_ITEMS=["gapps","root","override","ota","hma","download","lsposed"];

const CONFIG=[
  {id:"NoLineageProp",icon:"check_circle",title:"Spoof Lineage Props",desc:"Disable if camera fails",group:"reboot"},
  {id:"nodebug",icon:"fingerprint",title:"Debug Fingerprint",desc:"Hide custom ROM traces",group:"reboot"},
  {id:"build",icon:"build",title:"Debug Build",desc:"Spoof to user build",group:"reboot"},
  {id:"tag",icon:"sell",title:"Build Tag",desc:"Spoof to release-keys",group:"reboot"},
  {id:"encrypt",icon:"lock",title:"Spoof Encryption",desc:"Fake encryption status",group:"reboot"},
  {id:"twrp",icon:"settings_backup_restore",title:"Hide Recovery",desc:"Hide custom recovery",group:"reboot"},
  {id:"safemode",icon:"shield",title:"Safe Mode",desc:"Disable all extra features",group:"reboot"},
  {id:"skip",icon:"warning",title:"Skip System Patch",desc:"Do not spoof security patch",group:"reboot"},
  {id:"rukja",icon:"timer",title:"Disable AutoPilot",desc:"Stop auto updates",group:"reboot"},
  {id:"lsposed",icon:"cleaning_services",title:"Clear LSposed",desc:"Remove LSposed traces",group:"action"},
  {id:"gapps",icon:"delete_sweep",title:"Clear Gapps Logs",desc:"Wipe gapp logs",group:"action"},
  {id:"root",icon:"delete_forever",title:"Clear Module Logs",desc:"Wipe module logs",group:"action"},
  {id:"download",icon:"download",title:"Integrity Downloader",desc:"Download tools",group:"action"},
  {id:"override",icon:"system_update",title:"Lineage v2",desc:"Manual Lineage spoof",group:"action"},
  {id:"ota",icon:"update",title:"OTA Fix",desc:"Fix Lineage OTA errors",group:"action"},
  {id:"hma",icon:"visibility_off",title:"HMA Config",desc:"Inject HMA manually",group:"action"},
  {id:"iframe_gesture_right",icon:"swipe",title:"Right Gestures",desc:"Enable RHS back gestures",group:"general"},
  {id:"iframe_back_button",icon:"arrow_back",title:"Floating Back",desc:"Add floating back button",group:"general"},
  {id:"noredirect",icon:"block",title:"No Redirect",desc:"Disable Telegram redirects",group:"general"}
];

const MESSAGES={
  noredirect:{on:"Redirect disabled",off:"Redirect enabled"},
  NoLineageProp:{on:"Lineage props spoofed",off:"Lineage props unchanged"},
  gapps:{on:"Gapp logs cleared",off:"Gapp logs enabled"},
  safemode:{on:"Safe mode active",off:"Safe mode disabled"},
  twrp:{on:"Custom recovery spoofed",off:"Custom recovery disabled"},
  rukja:{on:"AutoPilot disabled",off:"AutoPilot enabled"},
  iframe_gesture_right:{on:"RHS gestures active",off:"RHS gestures disabled"},
  iframe_back_button:{on:"Floating button active",off:"Floating button disabled"},
  encrypt:{on:"Encryption spoofed",off:"Encryption disabled"},
  lsposed:{on:"LSposed cleared",off:"LSposed disabled"},
  nodebug:{on:"Debug fingerprint spoofed",off:"Debug fingerprint disabled"},
  build:{on:"Debug build spoofed",off:"Debug build disabled"},
  skip:{on:"Reboot your device to apply changes",off:"Reboot your device to apply changes"},
  tag:{on:"Build tag spoofed",off:"Build tag disabled"},
  root:{on:"Module logs cleared",off:"Module logs disabled"},
  override:{on:"Lineage v2 active",off:"Lineage v2 disabled"},
  ota:{on:"OTA fix active",off:"OTA fix disabled"},
  hma:{on:"HMA config injected",off:"HMA config disabled"},
  download:{on:"Downloader active",off:"Downloader disabled"}
};

let actionExecEnabled=false;

function popup(msg,type="info"){
  try{
    if(typeof window.toast==="function"){window.toast(String(msg));return}
    if(window.kernelsu&&typeof window.kernelsu.toast==="function"){window.kernelsu.toast(String(msg));return}
    if(typeof ksu==="object"&&typeof ksu.toast==="function"){ksu.toast(String(msg));return}
  }catch(e){}

  const n=document.createElement("div");
  n.className="webui-popup";
  n.textContent=msg;
  const colors={error:"#f44336",success:"#4caf50",info:"#1565c0",warn:"#ff8f00"};
  const bg=colors[type]||"#0099FF";
  Object.assign(n.style,{
    position:"fixed",top:"-70px",left:"50%",transform:"translateX(-50%)",
    background:bg,color:"#fff",padding:"0.8rem 1.2rem",borderRadius:"10px",
    boxShadow:"0 6px 18px rgba(0,0,0,0.35)",fontWeight:"600",zIndex:"99999",
    transition:"top 0.36s,opacity 0.36s",opacity:"0",
    backdropFilter:"blur(10px)",WebkitBackdropFilter:"blur(10px)",
    border:"1px solid rgba(255,255,255,0.1)"
  });
  document.body.appendChild(n);
  requestAnimationFrame(()=>{n.style.top="20px";n.style.opacity="1"});
  setTimeout(()=>{n.style.top="-70px";n.style.opacity="0";setTimeout(()=>n.remove(),420)},2500);
}

function runShell(cmd){
  return new Promise((resolve)=>{
    if(window.parent&&window.parent.runShellFromIframe){
      window.parent.runShellFromIframe(cmd).then(r=>resolve(r||"")).catch(()=>resolve(""));
    }else{
      resolve("");
    }
  });
}

async function toggleExec(){
  const row=document.getElementById("row-action_exec");
  const input=document.getElementById("cb-action_exec");
  if(row.classList.contains("spinning"))return;

  const newVal=!input.checked;
  input.checked=newVal;
  row.classList.toggle("active",newVal);
  actionExecEnabled=newVal;

  try{
    if(newVal){
      await runShell('touch "'+DIR+'/action_exec"');
      popup("Action execution enabled","success");
    }else{
      await runShell('rm -f "'+DIR+'/action_exec"');
      popup("Action execution disabled");
    }
  }catch(e){
    popup("Error: "+e.message,"error");
    input.checked=!newVal;
    row.classList.toggle("active",!newVal);
    actionExecEnabled=!newVal;
  }
}

async function toggle(id){
  const row=document.getElementById("row-"+id);
  const input=document.getElementById("cb-"+id);
  if(!input||row.classList.contains("spinning"))return;

  const newVal=!input.checked;
  input.checked=newVal;
  row.classList.toggle("active",newVal);

  const isAction=ACTION_ITEMS.includes(id);

  if(isAction&&newVal)row.classList.add("spinning");

  try{
    if(newVal){
      await runShell('touch "'+DIR+"/"+id+'"');
      if(isAction&&actionExecEnabled){
        popup("Executing action...","info");
        await runShell('sh "'+ACTION_SCRIPT+'"');
        popup(MESSAGES[id].on+" finished","success");
      }else{
        popup(MESSAGES[id].on,"success");
      }
    }else{
      await runShell('rm -f "'+DIR+"/"+id+'"');
      popup(MESSAGES[id].off);
    }
  }catch(e){
    popup("Error: "+e.message,"error");
    input.checked=!newVal;
    row.classList.toggle("active",!newVal);
  }finally{
    row.classList.remove("spinning");
  }
}

function createRow(cfg){
  const div=document.createElement("div");
  div.className="row";
  div.id="row-"+cfg.id;
  div.onclick=()=>toggle(cfg.id);

  div.innerHTML=
    '<div class="icon-wrap"><span class="material-icons">'+cfg.icon+'</span></div>'+
    '<div class="content">'+
      '<div class="title">'+cfg.title+'</div>'+
      '<div class="subtitle-text">'+cfg.desc+'</div>'+
    '</div>'+
    '<div class="status-dot"></div>'+
    '<label class="switch" onclick="event.stopPropagation()">'+
      '<input type="checkbox" id="cb-'+cfg.id+'">'+
      '<span class="slider"><span class="knob"></span></span>'+
    '</label>';

  return div;
}

async function refreshAll(){
  const allFiles=CONFIG.map(c=>c.id).concat(["action_exec"]).join(" ");
  const cmd='for f in '+allFiles+';do if [ -f "'+DIR+'/$f" ];then echo "$f:1";else echo "$f:0";fi;done';
  const result=await runShell(cmd);
  if(result){
    result.trim().split("\n").forEach(line=>{
      const[p,v]=line.split(":");
      if(p&&v){
        const id=p.trim();
        const cb=document.getElementById("cb-"+id);
        const row=document.getElementById("row-"+id);
        if(cb&&row){
          cb.checked=v.trim()==="1";
          row.classList.toggle("active",v.trim()==="1");
        }
        if(id==="action_exec"){
          actionExecEnabled=v.trim()==="1";
        }
      }
    });
  }
  popup("States refreshed","info");
}

function init(){
  const rows=document.getElementById("rows");
  CONFIG.forEach(c=>rows.appendChild(createRow(c)));
  setTimeout(refreshAll,50);
}

document.addEventListener("DOMContentLoaded",init);
</script>
</body>
</html>
