<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Control Centre</title>
<link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
<style>
:root{
  --bg:#1f2233;
  --fg:#e6e6e6;
  --accent:#4da3ff;
  --accent-glow:rgba(77,163,255,0.3);
  --panel-bg:#232637cc;
  --card-bg:#232637ee;
  --border-radius:20px;
  --shadow:rgba(0,0,0,0.4);
  --transition:0.3s;
  --success:#4dff88;
  --danger:#ff4d4d;
  --warning:#ffaa4d;
  --text2:#9aa3ff;
}
*{box-sizing:border-box}
body{
  margin:0;min-height:100vh;
  display:flex;align-items:center;justify-content:center;
  font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display",system-ui;
  background:radial-gradient(circle at 30% 20%,#1c2045 0%,#0e1020 100%);
  color:var(--fg);
  -webkit-font-smoothing:antialiased;
  padding:20px;
}
.card{
  width:380px;max-width:100%;
  background:var(--panel-bg);
  backdrop-filter:blur(20px);
  border-radius:var(--border-radius);
  padding:28px;
  box-shadow:0 25px 60px var(--shadow),0 0 0 1px rgba(255,255,255,0.06);
  position:relative;overflow:hidden;
  animation:cardEntry 0.6s cubic-bezier(0.2,0.8,0.2,1);
}
@keyframes cardEntry{
  from{opacity:0;transform:translateY(30px) scale(0.96)}
  to{opacity:1;transform:translateY(0) scale(1)}
}
.card::before{
  content:"";
  position:absolute;inset:0;
  background:radial-gradient(circle at 50% 0%,var(--accent) 0%,transparent 70%);
  filter:blur(40px);opacity:0.15;pointer-events:none;z-index:0;
  animation:glowPulse 8s ease-in-out infinite;
}
@keyframes glowPulse{0%,100%{opacity:0.12}50%{opacity:0.25}}
h1{
  position:relative;z-index:2;
  margin:0 0 8px 0;text-align:center;
  font-size:22px;font-weight:700;
  color:var(--fg);
  display:flex;align-items:center;justify-content:center;gap:10px;
}
.subtitle{
  text-align:center;color:var(--text2);
  font-size:13px;font-weight:500;margin-bottom:24px;
  position:relative;z-index:2;
}
.divider{
  position:relative;z-index:2;
  height:1px;
  background:linear-gradient(90deg,transparent,rgba(255,255,255,0.1),transparent);
  margin:16px 0;
}
.section-label{
  position:relative;z-index:2;
  font-size:11px;
  font-weight:600;
  text-transform:uppercase;
  letter-spacing:1.2px;
  color:var(--text2);
  margin-bottom:12px;
  padding-left:4px;
  display:flex;
  align-items:center;
  gap:8px;
}
.section-label::before{
  content:"";
  width:3px;
  height:14px;
  border-radius:2px;
  background:var(--accent);
  display:inline-block;
}
.row{
  position:relative;z-index:2;
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:14px;
  padding:16px;
  border-radius:16px;
  background:rgba(255,255,255,0.03);
  border:1px solid rgba(255,255,255,0.06);
  margin-bottom:10px;
  transition:all 0.25s cubic-bezier(0.4,0,0.2,1);
  cursor:pointer;
}
.row:hover{
  background:rgba(255,255,255,0.06);
  transform:translateY(-2px);
  box-shadow:0 8px 24px rgba(0,0,0,0.3);
  border-color:rgba(77,163,255,0.2);
}
.row:active{transform:scale(0.98)}
.row.active{
  background:rgba(77,163,255,0.1);
  border-color:rgba(77,163,255,0.4);
  box-shadow:0 0 20px rgba(77,163,255,0.15);
}
.row.active .icon-wrap{
  background:var(--accent);
  box-shadow:0 4px 16px var(--accent-glow);
}
.row.active .icon-wrap .material-icons{color:white}
.row.active .title{color:var(--accent)}
.row.active .status-dot{
  background:var(--success);
  box-shadow:0 0 12px var(--success);
}
.row.active .badge{
  background:rgba(77,255,136,0.15);
  border-color:rgba(77,255,136,0.25);
  color:var(--success);
}
.row.active .badge.warn{
  background:rgba(255,170,77,0.15);
  border-color:rgba(255,170,77,0.25);
  color:var(--warning);
}
.row.active .badge.danger{
  background:rgba(255,77,77,0.15);
  border-color:rgba(255,77,77,0.25);
  color:var(--danger);
}
.icon-wrap{
  width:44px;height:44px;border-radius:12px;
  background:rgba(255,255,255,0.08);
  display:flex;align-items:center;justify-content:center;
  transition:all 0.3s;flex-shrink:0;
  position:relative;
}
.icon-wrap .material-icons{
  font-size:24px;color:var(--text2);
  transition:all 0.3s;
}
.content{flex:1;min-width:0;overflow:hidden}
.title{
  font-size:15px;font-weight:600;
  color:var(--fg);margin-bottom:3px;
  transition:color 0.3s;
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
}
.subtitle-text{
  font-size:12px;color:var(--text2);
  font-weight:500;line-height:1.3;
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
}
.badge{
  display:inline-flex;
  align-items:center;
  gap:4px;
  font-size:10px;
  font-weight:600;
  padding:2px 8px;
  border-radius:6px;
  background:rgba(255,255,255,0.06);
  border:1px solid rgba(255,255,255,0.08);
  margin-top:4px;
  transition:all 0.3s;
  white-space:nowrap;
}
.badge .material-icons{font-size:10px}
.badge.warn{color:var(--warning)}
.badge.danger{color:var(--danger)}
.status-dot{
  width:8px;height:8px;border-radius:50%;
  background:rgba(255,255,255,0.2);
  transition:all 0.3s;flex-shrink:0;
}
.switch{
  position:relative;width:54px;height:30px;flex-shrink:0;
  pointer-events:none;
}
.switch input{position:absolute;opacity:0;width:0;height:0}
.slider{
  position:absolute;inset:0;border-radius:999px;
  background:rgba(255,255,255,0.1);
  transition:all var(--transition);
  box-shadow:inset 0 2px 4px rgba(0,0,0,0.2);
}
.knob{
  position:absolute;left:3px;top:3px;
  width:24px;height:24px;border-radius:50%;
  background:linear-gradient(145deg,#fff,#e0e0e0);
  transition:transform 0.25s cubic-bezier(0.2,0.8,0.2,1);
  box-shadow:0 2px 8px rgba(0,0,0,0.3);
}
.switch input:checked + .slider{
  background:var(--accent);
  box-shadow:0 0 20px var(--accent-glow);
}
.switch input:checked + .slider .knob{transform:translateX(24px)}
.switch input:disabled + .slider{
  background:rgba(255,255,255,0.05);
  opacity:0.5;
}
.row.spinning{pointer-events:none;opacity:0.6}
.row.spinning .icon-wrap::after{
  content:"";
  position:absolute;
  top:50%;left:50%;
  width:18px;height:18px;
  margin:-9px 0 0 -9px;
  border:2px solid var(--accent);
  border-top-color:transparent;
  border-radius:50%;
  animation:spin 0.7s linear infinite;
}
@keyframes spin{to{transform:rotate(360deg)}}
.action-btn{
  margin-top:20px;padding:16px;
  background:rgba(77,163,255,0.1);
  border:1px solid rgba(77,163,255,0.3);
  border-radius:16px;
  display:flex;align-items:center;justify-content:center;
  gap:10px;cursor:pointer;
  transition:all 0.25s;
  position:relative;z-index:2;
}
.action-btn:hover{
  background:rgba(77,163,255,0.2);
  transform:translateY(-2px);
  box-shadow:0 8px 24px rgba(77,163,255,0.2);
}
.action-btn:active{transform:scale(0.98)}
.action-btn .material-icons{
  font-size:20px;color:var(--accent);
  animation:spin 4s linear infinite;
  animation-play-state:paused;
}
.action-btn:hover .material-icons{animation-play-state:running}
.footer{
  margin-top:20px;text-align:center;
  color:var(--text2);font-size:12px;opacity:0.7;
  position:relative;z-index:2;
}
.webui-popup{
  position:fixed;
  top:-70px;
  left:50%;
  transform:translateX(-50%);
  padding:0.8rem 1.2rem;
  border-radius:10px;
  color:#fff;
  font-weight:600;
  font-size:13px;
  z-index:99999;
  box-shadow:0 6px 18px rgba(0,0,0,0.35);
  transition:top 0.36s,opacity 0.36s;
  opacity:0;
  pointer-events:none;
  white-space:nowrap;
  backdrop-filter:blur(10px);
  -webkit-backdrop-filter:blur(10px);
  border:1px solid rgba(255,255,255,0.1);
}
.reboot-hint{
  position:relative;z-index:2;
  text-align:center;
  font-size:11px;
  color:var(--warning);
  font-weight:600;
  margin-top:12px;
  opacity:0;
  transform:translateY(-5px);
  transition:all 0.3s ease;
}
.reboot-hint.show{
  opacity:1;
  transform:translateY(0);
}
.reboot-hint .material-icons{
  font-size:12px;
  vertical-align:middle;
  margin-right:4px;
}
.info-btn{
  position:relative;z-index:2;
  width:100%;
  padding:10px;
  border-radius:12px;
  background:rgba(77,163,255,0.08);
  border:1px solid rgba(77,163,255,0.15);
  color:var(--accent);
  font-family:inherit;
  font-size:12px;
  font-weight:600;
  cursor:pointer;
  margin-bottom:14px;
  transition:all 0.25s ease;
  display:flex;
  align-items:center;
  justify-content:center;
  gap:6px;
}
.info-btn:hover{
  background:rgba(77,163,255,0.15);
  transform:translateY(-1px);
  box-shadow:0 4px 16px rgba(77,163,255,0.15);
}
.info-btn:active{transform:scale(0.98)}
.info-btn .material-icons{font-size:16px}
.modal-overlay{
  position:fixed;inset:0;
  background:rgba(0,0,0,0.7);
  backdrop-filter:blur(10px);
  -webkit-backdrop-filter:blur(10px);
  display:none;
  align-items:flex-end;
  justify-content:center;
  z-index:1000;
  opacity:0;
  transition:opacity 0.3s ease;
}
.modal-overlay.show{
  display:flex;opacity:1;
}
.modal-sheet{
  width:100%;max-width:420px;
  background:var(--panel-bg);
  backdrop-filter:blur(30px);
  border-radius:24px 24px 0 0;
  padding:24px;
  max-height:80vh;
  overflow-y:auto;
  transform:translateY(100%);
  transition:transform 0.35s cubic-bezier(0.32,0.72,0,1);
  box-shadow:0 -20px 60px rgba(0,0,0,0.5);
  border:1px solid rgba(255,255,255,0.06);
  border-bottom:none;
}
.modal-overlay.show .modal-sheet{
  transform:translateY(0);
}
.modal-header{
  display:flex;
  align-items:center;
  justify-content:space-between;
  margin-bottom:20px;
}
.modal-title{
  font-size:18px;font-weight:700;
  color:var(--fg);
  display:flex;align-items:center;gap:8px;
}
.modal-title .material-icons{
  font-size:22px;color:var(--accent);
}
.modal-close{
  width:32px;height:32px;
  border-radius:50%;
  background:rgba(255,255,255,0.06);
  border:1px solid rgba(255,255,255,0.1);
  color:var(--text2);
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;
  transition:all 0.2s;
}
.modal-close:hover{
  background:rgba(255,255,255,0.1);
  color:var(--fg);
}
.modal-close .material-icons{font-size:18px}
.modal-divider{
  height:1px;
  background:linear-gradient(90deg,transparent,rgba(255,255,255,0.1),transparent);
  margin:12px 0;
}
.info-item{
  padding:12px 0;
  border-bottom:1px solid rgba(255,255,255,0.04);
}
.info-item:last-child{border-bottom:none}
.info-item-title{
  font-size:14px;font-weight:600;
  color:var(--fg);margin-bottom:4px;
  display:flex;align-items:center;gap:8px;
}
.info-item-title .material-icons{
  font-size:18px;color:var(--accent);
}
.info-item-desc{
  font-size:12px;color:var(--text2);
  line-height:1.4;
  padding-left:26px;
}
.info-item-flag{
  font-size:10px;color:var(--text2);
  opacity:0.6;
  margin-top:4px;
  padding-left:26px;
  font-family:"SF Mono",monospace;
}
.info-item-risk{
  font-size:10px;
  font-weight:600;
  margin-top:4px;
  padding-left:26px;
}
.info-section-title{
  font-size:13px;
  font-weight:700;
  color:var(--accent);
  text-transform:uppercase;
  letter-spacing:0.08em;
  margin:16px 0 8px 0;
  padding-left:4px;
}
.info-section-title:first-child{
  margin-top:0;
}
@media(max-width:420px){
  .card{width:100%;padding:22px}
  .row{padding:14px}
  .icon-wrap{width:40px;height:40px}
}
</style>
</head>
<body>

<div class="modal-overlay" id="infoModal" onclick="closeInfoModal(event)">
  <div class="modal-sheet" onclick="event.stopPropagation()">
    <div class="modal-header">
      <div class="modal-title"><span class="material-icons">info</span>What do these do?</div>
      <div class="modal-close" onclick="closeInfoModal()"><span class="material-icons">close</span></div>
    </div>
    <div id="infoContent"></div>
  </div>
</div>

<div class="card">
  <h1><span class="material-icons">settings</span>Control Centre</h1>
  <div class="subtitle">IntegrityBox Configuration</div>

  <div class="row" id="row-action_exec" onclick="toggleExec()">
    <div class="icon-wrap"><span class="material-icons">play_circle</span></div>
    <div class="content">
      <div class="title">Auto Run</div>
      <div class="subtitle-text">Run automation via toggle</div>
    </div>
    <div class="status-dot"></div>
    <label class="switch" onclick="event.stopPropagation()">
      <input type="checkbox" id="cb-action_exec">
      <span class="slider"><span class="knob"></span></span>
    </label>
  </div>

  <div class="divider"></div>
  <div class="section-label">This will be done after reboot</div>
  <button class="info-btn" onclick="openInfoModal()">
    <span class="material-icons">help_outline</span>
    What do these do?
  </button>
  <div id="flag-rows"></div>

  <div class="divider"></div>
  <div class="section-label">This will be done via action button</div>
  <div id="action-rows"></div>

  <div class="divider"></div>
  <div class="section-label">General</div>
  <div id="general-rows"></div>

  <div class="reboot-hint" id="rebootHint">
    <span class="material-icons">restart_alt</span>
    Reboot required to apply changes
  </div>

  <div class="action-btn" onclick="refreshAll()">
    <span class="material-icons">refresh</span>
    <span>Refresh States</span>
  </div>

  <div class="footer">IntegrityBox &bull; 2026</div>
</div>

<script>
var DIR="/data/adb/Box-Brain";
var ACTION_SCRIPT="/data/adb/modules/playintegrityfix/action.sh";

var BOOT_FLAGS=[
  {id:"hidehook",icon:"visibility_off",title:"Hide PIF Detection",label:"custom ROM",desc:"Hides PIF-related hooks and detection traces on boot.",risk:"low"},
  {id:"spoof-los-boot",icon:"android",title:"Hide Lineage",label:"custom ROM",desc:"Spoofs LineageOS-specific properties on boot so apps cannot detect you are running a LineageOS-based custom ROM.",risk:"low"},
  {id:"nuke-los-boot",icon:"delete_forever",title:"Nuke Lineage",label:"custom ROM",desc:"Aggressively removes all LineageOS traces including props, services and build fingerprints on boot.",risk:"medium"},
  {id:"spoof-custom-rom-boot",icon:"phone_android",title:"Hide Custom ROM",label:"custom ROM",desc:"Generic custom ROM hiding that spoofs build.props to appear as stock Android on boot.",risk:"low"},
  {id:"nuke-sus-boot",icon:"cleaning_services",title:"Hide SUS Files",label:"root traces",desc:"Cleans suspicious files and directories that may reveal root access or module presence on boot.",risk:"medium"},
//  {id:"fetch-pif-boot",icon:"cloud_download",title:"Update Pixel Config",label:"internet",desc:"Downloads latest Pixel configuration on every boot. Requires active internet connection.",risk:"low"},
//  {id:"fetch-target-boot",icon:"format_list_bulleted",title:"Update Target List",label:"tricky store",desc:"Automatically updates tricky store's target app list on boot.",risk:"low"},
//  {id:"fetch-keybox-boot",icon:"vpn_key",title:"Update Keybox",label:"internet",desc:"Updates valid keybox from server on boot to maintain valid device certification.",risk:"low"},
  {id:"spoof-selinux-boot",icon:"security",title:"Spoof SELinux",label:"bootloop risk",desc:"Spoofs SELinux status to report as enforcing. WARNING: May cause bootloops on some devices. Use with caution.",risk:"high"}
];

var REBOOT_FLAGS=[
  {id:"NoLineageProp",icon:"check_circle",title:"Spoof Lineage Props",label:"reboot",desc:"Spoofs LineageOS build properties. Disable if camera or other hardware fails."},
  {id:"nodebug",icon:"fingerprint",title:"Debug Fingerprint",label:"reboot",desc:"Hides custom ROM debug fingerprint traces from app detection."},
  {id:"build",icon:"build",title:"Debug Build",label:"reboot",desc:"Spoofs build type from userdebug to user to appear as unmodified device."},
  {id:"tag",icon:"sell",title:"Build Tag",label:"reboot",desc:"Spoofs build tags to release-keys instead of test-keys."},
  {id:"encrypt",icon:"lock",title:"Spoof Encryption",label:"reboot",desc:"Fakes device encryption status to appear as encrypted"},
  {id:"twrp",icon:"settings_backup_restore",title:"Hide Recovery",label:"reboot",desc:"Hides custom recovery presence by spoofing recovery path."},
  {id:"safemode",icon:"shield",title:"Safe Mode",label:"reboot",desc:"Disables all extra spoofing features for maximum compatibility mode."},
  {id:"skip",icon:"warning",title:"Skip System Patch",label:"reboot",desc:"Prevents spoofing of the security patch date. Use if banking apps detect patch mismatch. Disabling this can cause play integrity failure on old ROMs/Android versions"},
  {id:"ignore",icon:"stop",title:"Disable Target Sanitizer",label:"reboot",desc:"It won't remove system apps from target.txt automatically when there's an unnecessary module is installed which message up with it."},
  {id:"rukja",icon:"timer",title:"Disable AutoPilot",label:"reboot",desc:"Stops automatic keybox and fingerprint updates from running."}
];

var ACTION_FLAGS=[
  {id:"lsposed",icon:"cleaning_services",title:"Clear LSposed",label:"action",desc:"Removes LSposed framework traces from the system."},
  {id:"gapps",icon:"delete_sweep",title:"Clear Gapps Logs",label:"action",desc:"Wipes Google Apps log files to avoid custom ROM detection."},
  {id:"root",icon:"delete_forever",title:"Clear Module Logs",label:"action",desc:"Wipes all module-related log files to clean detection traces."},
  {id:"download",icon:"download",title:"Integrity Downloader",label:"action",desc:"Downloads required integrity tools and configurations."},
  {id:"override",icon:"system_update",title:"Lineage v2",label:"action",desc:"Manual LineageOS property spoofing with extended coverage."},
  {id:"ota",icon:"update",title:"OTA Fix",label:"action",desc:"Fixes LineageOS OTA update errors caused by spoofed properties."},
  {id:"hma",icon:"visibility_off",title:"HMA Config",label:"action",desc:"Injects Hide My Applist configuration manually into HMA OOS."}
];

var GENERAL_FLAGS=[
  {id:"iframe_gesture_right",icon:"swipe",title:"Right Gestures",desc:"Enables right-hand-side back gesture swipe area in WebUI iframes."},
  {id:"iframe_back_button",icon:"arrow_back",title:"Floating Back",desc:"Adds a floating back button overlay for easier iframe navigation."},
  {id:"noredirect",icon:"block",title:"No Redirect",desc:"Disables automatic Telegram link redirects from the WebUI."}
];

var ALL_FLAGS=BOOT_FLAGS.concat(REBOOT_FLAGS);

var MESSAGES={
  noredirect:{on:"Redirect disabled",off:"Redirect enabled"},
  iframe_gesture_right:{on:"RHS gestures active",off:"RHS gestures disabled"},
  iframe_back_button:{on:"Floating button active",off:"Floating button disabled"},
  safemode:{on:"Safe mode active",off:"Safe mode disabled"},
  twrp:{on:"Custom recovery spoofed",off:"Custom recovery disabled"},

  ignore:{on:"Target sanitizer disabled",off:"Target sanitizer enabled"},
  encrypt:{on:"Encryption spoofed",off:"Encryption disabled"},
  lsposed:{on:"LSposed cleared",off:"LSposed disabled"},
  nodebug:{on:"Debug fingerprint spoofed",off:"Debug fingerprint disabled"},
  build:{on:"Debug build spoofed",off:"Debug build disabled"},
  skip:{on:"Reboot your device to apply changes",off:"Reboot your device to apply changes"},
  tag:{on:"Build tag spoofed",off:"Build tag disabled"},
  root:{on:"Module logs cleared",off:"Module logs disabled"},
  override:{on:"Lineage v2 active",off:"Lineage v2 disabled"},
  ota:{on:"OTA fix active",off:"OTA fix disabled"},
  hma:{on:"HMA config injected",off:"HMA config disabled"},
  download:{on:"Downloader active",off:"Downloader disabled"},
  NoLineageProp:{on:"Lineage props spoofed",off:"Lineage props unchanged"},
  gapps:{on:"Gapp logs cleared",off:"Gapp logs enabled"}
};

var actionExecEnabled=false;
var bootFlagChanged=false;

function popup(msg,type){
  type=type||"info";
  try{
    if(typeof window.toast==="function"){window.toast(String(msg));return}
    if(window.kernelsu&&typeof window.kernelsu.toast==="function"){window.kernelsu.toast(String(msg));return}
    if(typeof ksu==="object"&&typeof ksu.toast==="function"){ksu.toast(String(msg));return}
  }catch(e){}

  var n=document.createElement("div");
  n.className="webui-popup";
  n.textContent=msg;
  var colors={error:"#f44336",success:"#4caf50",info:"#1565c0",warn:"#ff8f00"};
  var bg=colors[type]||"#0099FF";
  Object.assign(n.style,{
    position:"fixed",top:"-70px",left:"50%",transform:"translateX(-50%)",
    background:bg,color:"#fff",padding:"0.8rem 1.2rem",borderRadius:"10px",
    boxShadow:"0 6px 18px rgba(0,0,0,0.35)",fontWeight:"600",zIndex:"99999",
    transition:"top 0.36s,opacity 0.36s",opacity:"0",
    backdropFilter:"blur(10px)",WebkitBackdropFilter:"blur(10px)",
    border:"1px solid rgba(255,255,255,0.1)"
  });
  document.body.appendChild(n);
  requestAnimationFrame(function(){n.style.top="20px";n.style.opacity="1"});
  setTimeout(function(){n.style.top="-70px";n.style.opacity="0";setTimeout(function(){n.remove()},420)},2500);
}

function runShell(cmd){
  return new Promise(function(resolve){
    if(window.parent&&window.parent.runShellFromIframe){
      window.parent.runShellFromIframe(cmd).then(function(r){resolve(r||"")}).catch(function(){resolve("")});
    }else{
      resolve("");
    }
  });
}

function getBadgeClass(risk){
  if(risk==="high")return"danger";
  if(risk==="medium")return"warn";
  return"";
}

function getBadgeIcon(risk){
  if(risk==="high")return"warning";
  if(risk==="medium")return"error_outline";
  return"restart_alt";
}

function createFlagRow(cfg,isBoot){
  var div=document.createElement("div");
  div.className="row";
  if(isBoot){
    div.id="row-boot-"+cfg.id;
    div.onclick=function(){toggleBootFlag(cfg.id)};
  }else{
    div.id="row-"+cfg.id;
    div.onclick=function(){toggle(cfg.id)};
  }

  var badgeClass="";
  var badgeIcon="restart_alt";
  var badgeText=cfg.label;

  if(isBoot){
    badgeClass=getBadgeClass(cfg.risk);
    badgeIcon=getBadgeIcon(cfg.risk);
  }

  var inputId=isBoot?"cb-boot-"+cfg.id:"cb-"+cfg.id;

  div.innerHTML=
    '<div class="icon-wrap"><span class="material-icons">'+cfg.icon+'</span></div>'+
    '<div class="content">'+
      '<div class="title">'+cfg.title+'</div>'+
      '<div class="subtitle-text">'+cfg.desc+'</div>'+
      '<div class="badge '+badgeClass+'" id="badge-'+inputId+'"><span class="material-icons">'+badgeIcon+'</span>'+badgeText+'</div>'+
    '</div>'+
    '<div class="status-dot"></div>'+
    '<label class="switch" onclick="event.stopPropagation()">'+
      '<input type="checkbox" id="'+inputId+'">'+
      '<span class="slider"><span class="knob"></span></span>'+
    '</label>';

  return div;
}

async function toggleExec(){
  var row=document.getElementById("row-action_exec");
  var input=document.getElementById("cb-action_exec");
  if(row.classList.contains("spinning"))return;

  var newVal=!input.checked;
  input.checked=newVal;
  row.classList.toggle("active",newVal);
  actionExecEnabled=newVal;

  try{
    if(newVal){
      await runShell('touch "'+DIR+'/action_exec"');
      popup("Action execution enabled","success");
    }else{
      await runShell('rm -f "'+DIR+'/action_exec"');
      popup("Action execution disabled");
    }
  }catch(e){
    popup("Error: "+e.message,"error");
    input.checked=!newVal;
    row.classList.toggle("active",!newVal);
    actionExecEnabled=!newVal;
  }
}

async function toggle(id){
  var row=document.getElementById("row-"+id);
  var input=document.getElementById("cb-"+id);
  if(!input||row.classList.contains("spinning"))return;

  var newVal=!input.checked;
  input.checked=newVal;
  row.classList.toggle("active",newVal);

  var isAction=ACTION_FLAGS.some(function(a){return a.id===id});

  if(isAction&&newVal)row.classList.add("spinning");

  try{
    if(newVal){
      await runShell('touch "'+DIR+"/"+id+'"');
      if(isAction&&actionExecEnabled){
        popup("Executing action...","info");
        await runShell('sh "'+ACTION_SCRIPT+'"');
        popup(MESSAGES[id].on+" finished","success");
      }else{
        popup(MESSAGES[id].on,"success");
      }
    }else{
      await runShell('rm -f "'+DIR+"/"+id+'"');
      popup(MESSAGES[id].off);
    }
  }catch(e){
    popup("Error: "+e.message,"error");
    input.checked=!newVal;
    row.classList.toggle("active",!newVal);
  }finally{
    row.classList.remove("spinning");
  }
}

async function toggleBootFlag(id){
  var row=document.getElementById("row-boot-"+id);
  var input=document.getElementById("cb-boot-"+id);
  if(!input||row.classList.contains("spinning"))return;

  var newVal=!input.checked;
  input.checked=newVal;
  row.classList.toggle("active",newVal);

  var flagPath=DIR+"/"+id;

  try{
    if(newVal){
      await runShell('mkdir -p "'+DIR+'"');
      await runShell('touch "'+flagPath+'"');
      var verify=await runShell('test -f "'+flagPath+'" && echo EXISTS || echo MISSING');
      if(String(verify).trim()==="EXISTS"){
        popup(id+" enabled  Reboot required","success");
        showRebootHint();
      }else{
        popup(id+" failed to create","error");
        input.checked=false;
        row.classList.remove("active");
      }
    }else{
      await runShell('rm -f "'+flagPath+'"');
      var verify=await runShell('test -f "'+flagPath+'" && echo EXISTS || echo MISSING');
      if(String(verify).trim()==="MISSING"){
        popup(id+" disabled  Reboot required","info");
        showRebootHint();
      }else{
        popup(id+" failed to remove","error");
        input.checked=true;
        row.classList.add("active");
      }
    }
  }catch(e){
    popup("Error: "+e.message,"error");
    input.checked=!newVal;
    row.classList.toggle("active",!newVal);
  }
}

function showRebootHint(){
  bootFlagChanged=true;
  var hint=document.getElementById("rebootHint");
  hint.classList.add("show");
}

function openInfoModal(){
  var modal=document.getElementById("infoModal");
  var content=document.getElementById("infoContent");
  if(!content.innerHTML){
    var bootTitle=document.createElement("div");
    bootTitle.className="info-section-title";
    bootTitle.textContent="Boot Flags";
    content.appendChild(bootTitle);

    BOOT_FLAGS.forEach(function(item,i){
      var div=document.createElement("div");
      div.className="info-item";
      var riskColor=item.risk==="high"?"var(--danger)":item.risk==="medium"?"var(--warning)":"var(--success)";
      var riskText=item.risk==="high"?"High Risk":item.risk==="medium"?"Medium Risk":"Low Risk";
      div.innerHTML='<div class="info-item-title"><span class="material-icons">'+item.icon+'</span>'+item.title+'</div><div class="info-item-desc">'+item.desc+'</div><div class="info-item-flag">Flag: '+item.id+'</div><div class="info-item-risk" style="color:'+riskColor+'">'+riskText+'</div>';
      content.appendChild(div);
      if(i<BOOT_FLAGS.length-1){
        var d=document.createElement("div");
        d.className="modal-divider";
        content.appendChild(d);
      }
    });

    var rebootTitle=document.createElement("div");
    rebootTitle.className="info-section-title";
    rebootTitle.textContent="Reboot Flags";
    content.appendChild(rebootTitle);

    REBOOT_FLAGS.forEach(function(item,i){
      var div=document.createElement("div");
      div.className="info-item";
      div.innerHTML='<div class="info-item-title"><span class="material-icons">'+item.icon+'</span>'+item.title+'</div><div class="info-item-desc">'+item.desc+'</div><div class="info-item-flag">Flag: '+item.id+'</div>';
      content.appendChild(div);
      if(i<REBOOT_FLAGS.length-1){
        var d=document.createElement("div");
        d.className="modal-divider";
        content.appendChild(d);
      }
    });

    var actionTitle=document.createElement("div");
    actionTitle.className="info-section-title";
    actionTitle.textContent="Action Flags";
    content.appendChild(actionTitle);

    ACTION_FLAGS.forEach(function(item,i){
      var div=document.createElement("div");
      div.className="info-item";
      div.innerHTML='<div class="info-item-title"><span class="material-icons">'+item.icon+'</span>'+item.title+'</div><div class="info-item-desc">'+item.desc+'</div><div class="info-item-flag">Flag: '+item.id+'</div>';
      content.appendChild(div);
      if(i<ACTION_FLAGS.length-1){
        var d=document.createElement("div");
        d.className="modal-divider";
        content.appendChild(d);
      }
    });

    var generalTitle=document.createElement("div");
    generalTitle.className="info-section-title";
    generalTitle.textContent="General";
    content.appendChild(generalTitle);

    GENERAL_FLAGS.forEach(function(item,i){
      var div=document.createElement("div");
      div.className="info-item";
      div.innerHTML='<div class="info-item-title"><span class="material-icons">'+item.icon+'</span>'+item.title+'</div><div class="info-item-desc">'+item.desc+'</div><div class="info-item-flag">Flag: '+item.id+'</div>';
      content.appendChild(div);
      if(i<GENERAL_FLAGS.length-1){
        var d=document.createElement("div");
        d.className="modal-divider";
        content.appendChild(d);
      }
    });
  }
  modal.style.display="flex";
  requestAnimationFrame(function(){modal.classList.add("show")});
}

function closeInfoModal(e){
  if(e&&e.target!==e.currentTarget)return;
  var modal=document.getElementById("infoModal");
  modal.classList.remove("show");
  setTimeout(function(){modal.style.display="none"},350);
}

async function refreshAll(){
  var bootIds=BOOT_FLAGS.map(function(b){return b.id}).join(" ");
  var bootCmd='for f in '+bootIds+';do if [ -f "'+DIR+'/$f" ];then echo "boot:$f:1";else echo "boot:$f:0";fi;done';

  var rebootIds=REBOOT_FLAGS.map(function(b){return b.id}).join(" ");
  var rebootCmd='for f in '+rebootIds+';do if [ -f "'+DIR+'/$f" ];then echo "reboot:$f:1";else echo "reboot:$f:0";fi;done';

  var actionIds=ACTION_FLAGS.map(function(a){return a.id}).join(" ");
  var actionCmd='for f in '+actionIds+';do if [ -f "'+DIR+'/$f" ];then echo "action:$f:1";else echo "action:$f:0";fi;done';

  var generalIds=GENERAL_FLAGS.map(function(g){return g.id}).join(" ");
  var generalCmd='for f in '+generalIds+';do if [ -f "'+DIR+'/$f" ];then echo "general:$f:1";else echo "general:$f:0";fi;done';

  var execCmd='if [ -f "'+DIR+'/action_exec" ];then echo "exec:action_exec:1";else echo "exec:action_exec:0";fi';

  var result=await runShell(bootCmd+";"+rebootCmd+";"+actionCmd+";"+generalCmd+";"+execCmd);

  if(result){
    result.trim().split("\n").forEach(function(line){
      var parts=line.split(":");
      if(parts.length!==3)return;
      var type=parts[0].trim();
      var id=parts[1].trim();
      var val=parts[2].trim();

      if(type==="boot"){
        var cb=document.getElementById("cb-boot-"+id);
        var row=document.getElementById("row-boot-"+id);
        if(cb&&row){
          cb.checked=val==="1";
          row.classList.toggle("active",val==="1");
        }
      }else if(type==="reboot"||type==="action"||type==="general"){
        var cb2=document.getElementById("cb-"+id);
        var row2=document.getElementById("row-"+id);
        if(cb2&&row2){
          cb2.checked=val==="1";
          row2.classList.toggle("active",val==="1");
        }
      }else if(type==="exec"&&id==="action_exec"){
        var cb3=document.getElementById("cb-action_exec");
        var row3=document.getElementById("row-action_exec");
        if(cb3&&row3){
          cb3.checked=val==="1";
          row3.classList.toggle("active",val==="1");
          actionExecEnabled=val==="1";
        }
      }
    });
  }
  popup("States refreshed","info");
}

function init(){
  var flagContainer=document.getElementById("flag-rows");
  var actionContainer=document.getElementById("action-rows");
  var generalContainer=document.getElementById("general-rows");

  BOOT_FLAGS.forEach(function(b){flagContainer.appendChild(createFlagRow(b,true))});
  REBOOT_FLAGS.forEach(function(b){flagContainer.appendChild(createFlagRow(b,false))});
  ACTION_FLAGS.forEach(function(a){actionContainer.appendChild(createActionRow(a))});
  GENERAL_FLAGS.forEach(function(g){generalContainer.appendChild(createGeneralRow(g))});

  setTimeout(refreshAll,50);
}

document.addEventListener("DOMContentLoaded",init);
</script>
